<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0e14" />
      <stop offset="100%" stop-color="#1b1626" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9333ea" /> <!-- Purple -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Blue -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="140" fill="url(#bg)" />
  <rect width="500" height="500" x="6" y="6" rx="134" fill="transparent" stroke="url(#primary)" stroke-width="4" opacity="0.5" />

  <g transform="translate(128, 128)" stroke="url(#primary)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <path d="M 80,48 L 16,128 L 80,208" />
    <path d="M 176,48 L 240,128 L 176,208" />
    <path d="M 160,240 L 96,16" />
  </g>
</svg>
